<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, beautiful notes app inspired by Google Keep. Create, edit, organize, and color-code your notes.">
    <title>KeepNotes — Simple Notes App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>
<body>

    <!-- ── Header ─────────────────────────────────── -->
    <header class="header" id="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">📝</div>
                <span class="logo-text">KeepNotes</span>
            </div>

            <div class="search-wrapper">
                <input type="text" class="search-bar" id="search-bar"
                       placeholder="Search notes..." autocomplete="off">
                <span class="search-icon">🔍</span>
            </div>

            <span class="note-count" id="note-count">0 notes</span>
        </div>
    </header>

    <!-- ── Main Content ───────────────────────────── -->
    <main class="main" id="main">

        <!-- Create Note Area -->
        <div class="create-note-area">
            <!-- Collapsed Bar -->
            <div class="create-note-collapsed" id="create-collapsed">
                <span>Take a note...</span>
                <div class="create-icons">
                    <button title="New note" aria-label="New note">✏️</button>
                </div>
            </div>

            <!-- Expanded Form -->
            <div class="create-note-expanded" id="create-expanded">
                <input type="text" id="create-title" placeholder="Title" maxlength="200">
                <textarea id="create-content" placeholder="Take a note..." rows="3" maxlength="5000"></textarea>
                <div class="create-note-footer">
                    <div class="color-dots"></div>
                    <div class="create-actions">
                        <button class="btn btn-ghost" id="btn-close-create">Close</button>
                        <button class="btn btn-primary" id="btn-save">Save</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pinned Notes Section -->
        <section class="notes-section" id="pinned-section" style="display:none;">
            <div class="section-label">Pinned</div>
            <div class="notes-grid" id="pinned-grid"></div>
        </section>

        <!-- Other Notes Section -->
        <section class="notes-section" id="others-section" style="display:none;">
            <div class="section-label"></div>
            <div class="notes-grid" id="others-grid"></div>
        </section>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state" style="display:none;">
            <div class="empty-icon">📝</div>
            <h2 class="empty-title">No notes yet</h2>
            <p class="empty-subtitle">Click "Take a note..." to get started</p>
        </div>

    </main>

    <!-- ── Edit Modal ─────────────────────────────── -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="edit-modal">
            <div class="modal-body">
                <input type="text" id="modal-title" placeholder="Title" maxlength="200">
                <textarea id="modal-content" placeholder="Note content..." rows="6" maxlength="5000"></textarea>
            </div>
            <div class="modal-footer">
                <div class="color-dots"></div>
                <div class="modal-actions">
                    <button class="btn btn-ghost" id="btn-delete-modal" title="Delete note">🗑️ Delete</button>
                    <button class="btn btn-ghost" id="btn-close-modal">Cancel</button>
                    <button class="btn btn-primary" id="btn-save-edit">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Toast Container ────────────────────────── -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
